<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maonamassa – Serviços</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="header-avatar">👤</div>
      <div class="header-greeting">
        <small>Bem Vindo</small>
        <strong id="nome-usuario">Usuário</strong>
      </div>
      <div class="header-actions">
        <a href="cadastro.html" class="btn-header-link">Cadastrar</a>
      </div>
    </div>

    <!-- Barra de busca -->
    <div class="search-bar">
      <input type="text" id="busca" placeholder="Pesquisar Profissional..." />
      <button onclick="filtrarServicos()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- CATEGORIAS -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">Categorias</span>
      <a href="servicos.html" class="section-link">Mostrar todos</a>
    </div>
    <div class="category-grid">
      <div class="category-card" onclick="filtrarCategoria('Elétrica')">
        <div class="category-icon">⚡</div>
        <span class="category-label">Eletricista</span>
      </div>
      <div class="category-card" onclick="filtrarCategoria('Hidráulica')">
        <div class="category-icon">🔧</div>
        <span class="category-label">Encanador(a)</span>
      </div>
      <div class="category-card" onclick="filtrarCategoria('Pintura')">
        <div class="category-icon">🖌️</div>
        <span class="category-label">Pintor(a)</span>
      </div>
      <div class="category-card" onclick="filtrarCategoria('Manutenção')">
        <div class="category-icon">🔨</div>
        <span class="category-label">Manutenção</span>
      </div>
      <div class="category-card" onclick="filtrarCategoria('Montagem')">
        <div class="category-icon">🪛</div>
        <span class="category-label">Montador(a)</span>
      </div>
      <div class="category-card" onclick="filtrarCategoria('Limpeza')">
        <div class="category-icon">🧹</div>
        <span class="category-label">Diarista</span>
      </div>
    </div>
  </section>

  <!-- MELHORES PROFISSIONAIS -->
  <section class="section" style="margin-top: 8px; padding-bottom: 20px;">
    <div class="section-header">
      <span class="section-title">Serviços Disponíveis</span>
      <a href="servicos.html" class="section-link">Ver todos</a>
    </div>

    <div id="lista-servicos" class="card-list">
      <div class="loader">Carregando serviços...</div>
    </div>
  </section>

</div><!-- /app-wrapper -->

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/>
    </svg>
    Home
  </a>
  <a href="servicos.html" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-1a4 4 0 00-4-4H6a4 4 0 00-4 4v1h5m6-10a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
    Profissionais
  </a>
  <a href="#" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
    </svg>
    Agenda
  </a>
  <a href="cadastro.html" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A11.955 11.955 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    Perfil
  </a>
</nav>

<script src="js/main.js"></script>

</body>
</html>
