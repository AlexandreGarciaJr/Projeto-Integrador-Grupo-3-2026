<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maonamassa – Cadastro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="app-wrapper">

    <!-- HEADER DO FORMULÁRIO -->
    <div class="form-header">
      <div class="form-logo">🔨</div>
      <h1>Maonamassa</h1>
      <p>Crie sua conta e encontre os melhores profissionais</p>
    </div>

    <div class="form-body">

      <!-- Alerta de retorno -->
      <div class="alert alert-success" id="alert-success">Cadastro realizado com sucesso!</div>
      <div class="alert alert-error" id="alert-error">Erro ao cadastrar. Verifique os dados.</div>

      <!-- Toggle: Usuário ou Prestador -->
      <div class="type-toggle">
        <input type="radio" name="tipo" id="tipo-usuario" value="usuario" checked />
        <label for="tipo-usuario">👤 Sou Cliente</label>

        <input type="radio" name="tipo" id="tipo-prestador" value="prestador" />
        <label for="tipo-prestador">🔧 Sou Prestador</label>
      </div>

      <!-- Formulário -->
      <form id="form-cadastro" novalidate>

        <div class="form-group">
          <label>Nome Completo</label>
          <input type="text" id="nome" placeholder="Ex: João da Silva" required />
        </div>

        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>

        <div class="form-group">
          <label>CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required />
        </div>

        <div class="form-group">
          <label>Telefone</label>
          <input type="text" id="telefone" placeholder="(11) 99999-9999" maxlength="15" required />
        </div>

        <!-- Campo extra só para prestadores -->
        <div id="campo-especialidade" style="display:none;">
          <div class="form-group">
            <label>Especialidade principal</label>
            <select id="especialidade">
              <option value="">Selecione sua área...</option>
              <option value="Elétrica">⚡ Eletricista</option>
              <option value="Hidráulica">🔧 Encanador(a)</option>
              <option value="Pintura">🖌️ Pintor(a)</option>
              <option value="Manutenção">🔨 Manutenção Geral</option>
              <option value="Montagem">🪛 Montador(a)</option>
              <option value="Limpeza">🧹 Diarista / Limpeza</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required />
        </div>

        <div class="form-group">
          <label>Confirmar Senha</label>
          <input type="password" id="confirmar-senha" placeholder="Repita a senha" required />
        </div>

        <button type="submit" class="btn btn-primary" id="btn-submit">
          Criar Conta
        </button>

      </form>

      <div class="divider-text">ou</div>

      <a href="index.html" class="btn btn-outline" style="display:block; text-align:center; padding: 13px;">
        Voltar para o início
      </a>

      <p class="form-footer-link">
        Já tem conta? <a href="#">Entrar</a>
      </p>

    </div>
  </div><!-- /app-wrapper -->

  <!-- Sem bottom nav na tela de cadastro para não poluir -->

  <script src="js/main.js"></script>
  <script src="js/cadastro.js"></script>

</body>

</html>
