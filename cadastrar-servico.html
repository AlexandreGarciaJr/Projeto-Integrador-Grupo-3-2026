<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maonamassa – Cadastrar Serviço</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="app-wrapper">

    <!-- HEADER -->
    <div class="prestador-header">
      <button class="btn-back" onclick="history.back()">← Voltar</button>
      <div class="form-logo">⚒️</div>
      <h1>Cadastrar Serviço</h1>
      <p id="subtitulo-prestador">Olá, Prestador! Ofereça seu serviço.</p>
    </div>

    <div class="form-body">

      <div class="alert alert-success" id="alert-success">Serviço cadastrado com sucesso!</div>
      <div class="alert alert-error" id="alert-error">Erro ao cadastrar serviço.</div>

      <!-- Seleção de Categoria (Elétrica ou Hidráulica) -->
      <p
        style="font-size:13px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px;">
        Área do Serviço
      </p>
      <div class="service-type-grid">
        <div class="type-chip" id="chip-eletrica" onclick="selecionarCategoria('Elétrica')">
          <span>⚡</span>
          Elétrica
        </div>
        <div class="type-chip" id="chip-hidraulica" onclick="selecionarCategoria('Hidráulica')">
          <span>🔧</span>
          Hidráulica
        </div>
      </div>

      <form id="form-servico" novalidate>
        <input type="hidden" id="categoria-selecionada" value="" />

        <div class="form-group">
          <label>Tipo de Serviço</label>
          <select id="tipo-servico" required>
            <option value="">Selecione a área primeiro...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Título do Serviço</label>
          <input type="text" id="titulo" placeholder="Ex: Instalação de tomadas e interruptores" required />
        </div>

        <div class="form-group">
          <label>Descrição</label>
          <textarea id="descricao"
            placeholder="Descreva o serviço que você oferece, sua experiência e o que está incluso..."
            required></textarea>
        </div>

        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="number" id="valor" placeholder="Ex: 150.00" min="0" step="0.01" required />
        </div>

        <button type="submit" class="btn btn-primary sticky-btn" id="btn-submit">
          Publicar Serviço
        </button>
      </form>

      <a href="index.html" class="btn btn-ghost"
        style="display:block; text-align:center; margin-top:12px; padding:13px;">
        Ir para o início
      </a>

    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/cadastrarservico.js"></script>

</body>

</html>
